services:
  amplify-agent:
    image: nginxinc/amplify-agent:latest
    container_name: tienda-eco-amplify
    profiles:
      - amplify
    depends_on:
      - nginx
    environment:
      - API_KEY=${AMPLIFY_API_KEY:-}
      - NGINX_STATUS_URL=http://nginx/nginx_status
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  netdata:
    image: netdata/netdata:stable
    container_name: tienda-eco-netdata
    ports:
      - '19999:19999'
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: tienda-eco-nginx-exporter
    depends_on:
      - nginx
    command:
      - --nginx.scrape-uri=http://nginx/nginx_status

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tienda-eco-prometheus
    depends_on:
      - nginx-exporter
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.2.2
    container_name: tienda-eco-grafana
    depends_on:
      - prometheus
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  netdata_config:
  netdata_lib:
  netdata_cache:
  prometheus_data:
  grafana_data:

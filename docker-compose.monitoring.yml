services:
  amplify-agent:
    image: nginxinc/amplify-agent:latest
    container_name: tienda-eco-amplify
    profiles:
      - amplify
    depends_on:
      - nginx
    environment:
      - API_KEY=${AMPLIFY_API_KEY:-}
      - NGINX_STATUS_URL=http://nginx/nginx_status
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  netdata:
    image: netdata/netdata:stable
    container_name: tienda-eco-netdata
    ports:
      - '19999:19999'
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  netdata_config:
  netdata_lib:
  netdata_cache:
